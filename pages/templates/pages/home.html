{% extends 'base.html' %}

{% block title %}Home | Eye Clinic{% endblock %}

{% block content %}
<div class="text-center">
    <h1 class="display-4">Welcome to Our Eye Clinic</h1>
    <p class="lead">Professional eye care services.</p>

    {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}" class="btn bth-success btn-lg mt-3">
            Go to Dashboard
        </a>
    {% else %}
        <a href="{% url 'login' %}" class="btn btn-primary btn-lg mt-3">
            Login
        </a>
        <a href="{% url 'register' %}" class="btn btn-outline-secondary btn-lg mt-3 ms-2">
            Register
        </a>
    {% endif %}            
</div>
{% endblock %}
